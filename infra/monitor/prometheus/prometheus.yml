global:
  scrape_interval: 10s
  scrape_timeout: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    metrics_path: "/metrics"

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: "/metrics"

  - job_name: "node_exporter"
    static_configs:
      - targets: ["node_exporter:9100"]
    metrics_path: "/metrics"

  - job_name: "dcgm_exporter"
    static_configs:
      - targets: ["dcgm-exporter:9400"]
    metrics_path: "/metrics"

  # Serving API (FastAPI) - metrics mỗi 10s
  - job_name: "serving_api"
    metrics_path: "/metrics"
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "data_drift_score.*"
        action: drop
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "yolo-serving"

  # thu data_drift_score, 30 phút một lần
  - job_name: "serving_api_drift"
    scrape_interval: 30m
    metrics_path: "/metrics"
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "data_drift_score.*"
        action: keep
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "yolo-serving"
          metric_type: "drift"

  # --- API chạy trên host 
  - job_name: "serving_api_host"
    metrics_path: "/metrics"
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "data_drift_score.*"
        action: drop
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: "yolo-serving"
          source: "host"

  - job_name: "serving_api_drift_host"
    scrape_interval: 1m
    metrics_path: "/metrics"
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "data_drift_score.*"
        action: keep
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: "yolo-serving"
          metric_type: "drift"
          source: "host"