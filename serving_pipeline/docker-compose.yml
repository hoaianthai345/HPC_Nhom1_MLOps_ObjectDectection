services:
  api:
    build:
      context: ..
      dockerfile: serving_pipeline/docker/Dockerfile.backend
    container_name: serving_api
    restart: unless-stopped
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
    ports:
      - "8000:8000"
    networks:
      - aio-network
    environment:
      - DEBUG=true
      - HOST=0.0.0.0
      - API_PORT=8000
      - GRADIO_PORT=7860
      - YOLO_MODEL_PATH=/app/yolo26n.pt
      - YOLO_CONFIDENCE_THRESHOLD=0.25
      - YOLO_IOU_THRESHOLD=0.45
      - YOLO_MAX_DETECTIONS=100
      - DEVICE=cpu
      - MLFLOW_TRACKING_URI=http://mlflow_server:5000
      - MLFLOW_MODEL_URI=models:/yolo-nano-model@production
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minio_admin
      - AWS_SECRET_ACCESS_KEY=minio_password123
      - AWS_DEFAULT_REGION=us-east-1
      - PRODUCTION_DIR=/data/production
      - USE_MINIO=true
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_PRODUCTION_BUCKET=production-data
    volumes:
      # Mount source code for hot reload
      - ..:/app:ro
      # Mount volume for production samples (drift detection)
      - production_data:/data/production
      # Mount local models as fallback
      - ../yolo26n.pt:/app/yolo26n.pt:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # GPU-enabled API Service
  api-gpu:
    build:
      context: ..
      dockerfile: serving_pipeline/docker/Dockerfile.backend
    container_name: serving_api_gpu
    restart: unless-stopped
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
    ports:
      - "8001:8000"
    networks:
      - aio-network
    environment:
      - DEBUG=true
      - HOST=0.0.0.0
      - API_PORT=8000
      - GRADIO_PORT=7860
      - YOLO_MODEL_PATH=/app/yolo26n.pt
      - YOLO_CONFIDENCE_THRESHOLD=0.25
      - YOLO_IOU_THRESHOLD=0.45
      - YOLO_MAX_DETECTIONS=100
      - DEVICE=cuda
      - MLFLOW_TRACKING_URI=http://mlflow_server:5000
      - MLFLOW_MODEL_URI=models:/yolo-nano-model@production
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minio_admin
      - AWS_SECRET_ACCESS_KEY=minio_password123
      - AWS_DEFAULT_REGION=us-east-1
      - PRODUCTION_DIR=/data/production
      - USE_MINIO=true
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_PRODUCTION_BUCKET=production-data
      # TensorRT Settings
      - TENSORRT_ENABLED=true
      - TENSORRT_MODEL_NAME=yolo-nano-model
      - TENSORRT_BUCKET=model-exports
      - TENSORRT_USE_LATEST=true
      - TENSORRT_VERSION=
    volumes:
      # Mount source code for hot reload
      - ..:/app:ro
      # Mount volume for production samples (drift detection)
      - production_data:/data/production
      # Mount local models as fallback
      - ../yolo26n.pt:/app/yolo26n.pt:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Gradio UI Service
  ui:
    build:
      context: ..
      dockerfile: serving_pipeline/docker/Dockerfile.ui
    container_name: serving_ui
    restart: unless-stopped
    ports:
      - "7860:7860"
    networks:
      - aio-network
    environment:
      - DEBUG=true
      - HOST=0.0.0.0
      - API_PORT=8000
      - GRADIO_PORT=7860
      - API_HOST=api
      - GPU_API_HOST=api-gpu
      - GPU_API_PORT=8000
      - YOLO_MODEL_PATH=yolo26n.pt
      - YOLO_CONFIDENCE_THRESHOLD=0.25
      - YOLO_IOU_THRESHOLD=0.45
      - MAX_FILE_SIZE_MB=10.0
      - PRODUCTION_DIR=/tmp/production
    volumes:
      - ..:/app:ro
    depends_on:
      api:
        condition: service_healthy
      api-gpu:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  production_data:
    driver: local

networks:
  aio-network:
    external: true
